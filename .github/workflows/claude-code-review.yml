name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Flag auto-fix PR for extra scrutiny
        if: contains(github.event.pull_request.labels.*.name, 'auto-fix')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body "$(cat <<'BODY'
          **Auto-Fix PR — Extra Scrutiny Required**

          This PR was generated by the self-healing automation agent. Before approving:
          - [ ] Fix addresses the root cause, not just symptoms
          - [ ] Test coverage adequately validates the fix
          - [ ] Changes stay within the adapter safe zone (`src/adapters/`, `prisma/seed.ts`, test files)
          - [ ] No security issues introduced
          - [ ] No secrets or credentials committed
          BODY
          )"

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@ba7fa4bcf054319261202aef93d71a89112a8d00 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
