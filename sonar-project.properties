# Seed data files are inherently structural-repetition heavy (kennel records,
# source configs sharing object shape). CPD flags pre-existing duplication
# every time a new entry is added; the rule is the wrong tool for these files.
# Use literal paths (matching the working `prisma/seed.ts` entry) since some
# Sonar glob expansions skip files at the directory root.
sonar.cpd.exclusions=prisma/seed.ts,prisma/seed-data/sources.ts,prisma/seed-data/kennels.ts,prisma/seed-data/aliases.ts
